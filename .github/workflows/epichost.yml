name: Epichost Auto Renew

on:
  schedule:
    # 每 6小时 运行一次
    - cron: '0 */6 * * *'
  
  workflow_dispatch:  # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout private script repository
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/${{ secrets.PRIVATE_REPO_NAME }}
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        path: scripts
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Check dependencies
      run: |
        curl --version
        python --version
    
    - name: Run renew script
      env:
        PANEL_DOMAIN: ${{ secrets.PANEL_DOMAIN }}
        API_KEY: ${{ secrets.API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: Asia/Shanghai
      working-directory: scripts/Epichost
      run: python main.py
    
    - name: Upload JSON artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: renew-data-${{ github.run_number }}
        path: |
          scripts/Epichost/servers_list.json
          scripts/Epichost/servers_info.json
          scripts/Epichost/renew_response_*.json
        retention-days: 30
        if-no-files-found: ignore
