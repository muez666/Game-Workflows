name: KeritCloud Auto Renew

on:
  schedule:
    # 北京时间中午12点 = UTC 04:00
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/KeritCloud-Auto-Renew  # 私库的仓库位置
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install gost (proxy converter)
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          sudo mv gost-linux-amd64-2.11.5 /usr/local/bin/gost
      
      - name: Start gost proxy (if proxy configured)
        env:
          SOCKS_PROXY_URL: ${{ secrets.SOCKS_PROXY_URL }}
        if: ${{ env.SOCKS_PROXY_URL != '' }}
        run: |
          # URL 编码处理（Python 自动处理特殊字符）
          python3 << 'EOF'
          import os
          import urllib.parse
          import subprocess
          
          proxy_url = os.environ.get('SOCKS_PROXY_URL', '')
          if proxy_url:
              # 解析并重新编码 URL 以确保特殊字符正确处理
              parsed = urllib.parse.urlparse(proxy_url)
              
              # 如果有用户名和密码，确保它们被正确编码
              if parsed.username and parsed.password:
                  username = urllib.parse.quote(parsed.username, safe='')
                  password = urllib.parse.quote(parsed.password, safe='')
                  netloc = f"{username}:{password}@{parsed.hostname}:{parsed.port}"
                  encoded_url = f"{parsed.scheme}://{netloc}"
              else:
                  encoded_url = proxy_url
              
              print(f"Starting gost with proxy (credentials hidden)")
              # 启动 gost
              cmd = f"nohup gost -L=socks5://127.0.0.1:1080 -F={encoded_url} > /tmp/gost.log 2>&1 &"
              subprocess.run(cmd, shell=True)
              print("Gost proxy started on 127.0.0.1:1080")
          EOF
          
          sleep 3
          # 验证 gost 是否运行
          ps aux | grep gost || echo "Warning: gost may not be running"
          # 显示 gost 日志（隐藏敏感信息）
          if [ -f /tmp/gost.log ]; then
            echo "Gost log:"
            head -20 /tmp/gost.log
          fi
      
      - name: Install dependencies
        working-directory: scripts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb
      
      - name: Run renewal script with xvfb
        working-directory: scripts
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SOCKS_PROXY_URL: ${{ secrets.SOCKS_PROXY_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python main.py
      
      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewal-screenshot
          path: scripts/screenshots/renewal_completed.png
          if-no-files-found: ignore
          retention-days: 7
