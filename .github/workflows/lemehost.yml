name: Lemehost Cookie Autosave

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  autosave-cookies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Lemehost-Cookie-Autosave
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install -r requirements.txt -q > /dev/null 2>&1
          playwright install chromium > /dev/null 2>&1
          playwright install-deps chromium > /dev/null 2>&1
      
      - name: Run cookie getter script
        working-directory: scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEMEHOST_ACCOUNTS: ${{ secrets.LEMEHOST_ACCOUNTS }}
        run: python main.py
      
      - name: Commit and push cookies to private repo
        working-directory: scripts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cookies.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 自动更新 Cookie - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
